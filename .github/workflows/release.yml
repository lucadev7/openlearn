name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the Windows
# installer + portable .exe and attach them to a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm ci

      - name: Build & release (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "OpenLearn ${{ github.ref_name }}"
          releaseBody: |
            OpenLearn ${{ github.ref_name }}

            Im Anhang: Windows-Installer (`-setup.exe`) und portable `.exe`.
            ⚠️ Unsigniert — SmartScreen evtl. „Weitere Informationen → Trotzdem ausführen".
          releaseDraft: true
          prerelease: false
